server.port=${PORT:8082}
logging.level.org.atmosphere=warn

# Launch the default browser when starting the application in development mode
vaadin.launch-browser=true

# To improve the performance during development.
# For more information https://vaadin.com/docs/latest/flow/integrations/spring/configuration#special-configuration-parameters
vaadin.allowed-packages=com.vaadin,org.vaadin,com.flowingcode,com.unilabs

# 🗄️ Ligação à Base de Dados PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5433/notification_db
spring.datasource.username=admin
spring.datasource.password=admin_password123
spring.datasource.driver-class-name=org.postgresql.Driver

# 🛠️ Configurações do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URL do backend REST (API de notificações)
notification.backend.url=http://localhost:8080

# 🔐 API Key para autenticar no backend
notification.api.key=unilabs-secret-key-2026
